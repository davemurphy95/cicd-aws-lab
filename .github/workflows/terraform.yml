name: Deploy AWS Infrastructure with Terraform

# Trigger the workflow on push or pull request to the main branch
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  terraform:
    name: Infrastructure Deployment on AWS
    runs-on: ubuntu-latest

    # Environment Variables
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: us-east-1        # ADDED - required by AWS provider

    steps:
      # Checkout the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4          # FIXED - was v2

      # Install Terraform
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3 # FIXED - was v1
        with:
          terraform_version: 1.9.0         # FIXED - was 1.0.0

      # Initialize Terraform
      - name: Initialize Terraform
        run: terraform init                 # FIXED - comment typo

      # Check Terraform formatting
      - name: Format Check                  # ADDED - missing best practice
        run: terraform fmt -check
        continue-on-error: true

      # Validate Terraform Configuration for errors
      - name: Validate Terraform Configuration
        run: terraform validate             # FIXED - comment typo

      # Show execution plan and save to file
      - name: Plan Terraform Deployment
        run: terraform plan -out=tfplan     # FIXED - added -out flag

      # Apply only on push to main, not on pull requests
      - name: Apply Terraform Deployment
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'  # ADDED - safety guard
        run: terraform apply -auto-approve tfplan  # FIXED - typo + uses saved plan